name: deploy-xanadu-test (TESTING ONLY)

# Isolated Open WebUI test deployment for Gavin.
# Pushes to `testing` deploy to https://chat-test.yxanadu.com.
# Do not use this workflow for production; production is `deploy-xanadu` on `main`.
on:
  push:
    branches:
      - testing

# Testing deploys are intentionally branch-bound:
# only pushes that update `testing` may run this workflow.
# The `xanadu-testing` GitHub environment also has a custom
# deployment branch policy allowing only `testing`.
concurrency:
  group: open-webui-xanadu-test-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-image:
    name: Build test image off-host
    # Keep the heavy Docker/Node build off xanadu-host so test deploys do not
    # starve or restart Gavin's production Open WebUI session container.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:xanadu-test-${{ github.sha }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
            USE_SLIM=true
            NODE_MAX_OLD_SPACE_SIZE=2048

  deploy-test:
    name: Deploy Open WebUI test stack to xanadu-host
    needs: build-test-image
    environment:
      name: xanadu-testing
      url: https://chat-test.yxanadu.com
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - xanadu-host
      - open-webui-deploy
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show deploy target
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          git rev-parse HEAD

      - name: Deploy test stack to xanadu-host
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          OPENWEBUI_TEST_IMAGE: ghcr.io/${{ github.repository }}:xanadu-test-${{ github.sha }}
        run: |
          chmod +x scripts/deploy-xanadu-openwebui-test.sh
          ./scripts/deploy-xanadu-openwebui-test.sh

      - name: Verify public test deployment
        run: |
          set -euo pipefail
          for url in \
            https://chat-test.yxanadu.com/ \
            https://chat-test.yxanadu.com/api/version \
            http://127.0.0.1:3023/health
          do
            echo "checking $url"
            code=$(curl -k -sS -o /tmp/openwebui-test-check -w '%{http_code}' "$url")
            echo "code=$code"
            test "$code" = "200"
            head -c 300 /tmp/openwebui-test-check || true
            echo
            echo
          done
