name: deploy-xanadu-test (TESTING ONLY)

# Isolated Open WebUI test deployment for Gavin.
# Pushes to `testing` deploy to https://chat-test.yxanadu.com.
# Do not use this workflow for production; production is `deploy-xanadu` on `main`.
on:
  push:
    branches:
      - testing

# Testing deploys are intentionally branch-bound:
# only pushes that update `testing` may run this workflow.
# The `xanadu-testing` GitHub environment also has a custom
# deployment branch policy allowing only `testing`.
concurrency:
  group: open-webui-xanadu-test-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-image:
    name: Build test image off-host
    # Keep the heavy Docker/Node build off xanadu-host so test deploys do not
    # starve or restart Gavin's production Open WebUI session container.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:xanadu-test-${{ github.sha }}
          build-args: |
            BUILD_HASH=${{ github.sha }}
            USE_SLIM=true
            NODE_MAX_OLD_SPACE_SIZE=4096

  deploy-test:
    name: Deploy Open WebUI test stack to xanadu-host
    needs: build-test-image
    environment:
      name: xanadu-testing
      url: https://chat-test.yxanadu.com
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - xanadu-host
      - open-webui-deploy
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show deploy target
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          git rev-parse HEAD

      - name: Capture production canary before test deploy
        run: |
          set -euo pipefail
          docker inspect hermes-open-webui --format 'restarts={{.RestartCount}} started={{.State.StartedAt}} status={{.State.Status}} oom={{.State.OOMKilled}}' | tee /tmp/openwebui-prod-canary-before.txt
          curl -k -sS -o /tmp/openwebui-prod-canary-body -w 'prod_before code=%{http_code} total=%{time_total}\n' https://chat.yxanadu.com/
          grep -q 'restarts=' /tmp/openwebui-prod-canary-before.txt

      - name: Sync Hermes runtime bridge on xanadu-host
        run: |
          python3 scripts/xanadu-sync-hermes-runtime-bridge.py

      - name: Deploy test stack to xanadu-host
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          OPENWEBUI_TEST_IMAGE: ghcr.io/${{ github.repository }}:xanadu-test-${{ github.sha }}
          OPENWEBUI_TEST_SKIP_STORAGE_MAINTENANCE: "1"
        run: |
          chmod +x scripts/deploy-xanadu-openwebui-test.sh
          ./scripts/deploy-xanadu-openwebui-test.sh

      - name: Verify public test deployment
        run: |
          set -euo pipefail
          for url in \
            https://chat-test.yxanadu.com/ \
            https://chat-test.yxanadu.com/api/version \
            http://127.0.0.1:3023/health
          do
            echo "checking $url"
            code=$(curl -k -sS -o /tmp/openwebui-test-check -w '%{http_code}' "$url")
            echo "code=$code"
            test "$code" = "200"
            head -c 300 /tmp/openwebui-test-check || true
            echo
            echo
          done

      - name: Verify production stayed up during test deploy
        run: |
          set -euo pipefail
          before_restarts=$(sed -n 's/.*restarts=\([0-9][0-9]*\).*/\1/p' /tmp/openwebui-prod-canary-before.txt)
          after_state=$(docker inspect hermes-open-webui --format 'restarts={{.RestartCount}} started={{.State.StartedAt}} status={{.State.Status}} oom={{.State.OOMKilled}}')
          echo "prod_before $(cat /tmp/openwebui-prod-canary-before.txt)"
          echo "prod_after  ${after_state}"
          after_restarts=$(printf '%s\n' "$after_state" | sed -n 's/.*restarts=\([0-9][0-9]*\).*/\1/p')
          code=$(curl -k -sS -o /tmp/openwebui-prod-canary-body -w '%{http_code}' https://chat.yxanadu.com/)
          echo "prod_after code=$code"
          test "$code" = "200"
          if [[ -z "$before_restarts" || -z "$after_restarts" ]]; then
            echo "Could not parse production restart counters" >&2
            exit 1
          fi
          if [[ "$after_restarts" != "$before_restarts" ]]; then
            echo "Production Open WebUI restarted during testing deploy; failing test deploy to prevent silent interference." >&2
            exit 1
          fi
