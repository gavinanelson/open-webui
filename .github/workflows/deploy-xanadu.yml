name: deploy-xanadu

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: open-webui-xanadu-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Open WebUI to xanadu-host
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - xanadu-host
      - open-webui-deploy
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show deploy target
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          git rev-parse HEAD

      - name: Deploy to xanadu-host
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/deploy-xanadu-openwebui.sh
          ./scripts/deploy-xanadu-openwebui.sh

      - name: Verify public deployment
        run: |
          set -euo pipefail
          for url in \
            https://chat.yxanadu.com/ \
            https://chat.yxanadu.com/api/version \
            http://127.0.0.1:3013/health
          do
            echo "checking $url"
            code=$(curl -k -sS -o /tmp/openwebui-check -w '%{http_code}' "$url")
            echo "code=$code"
            test "$code" = "200"
            head -c 300 /tmp/openwebui-check || true
            echo
            echo
          done
