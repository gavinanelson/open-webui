name: deploy-xanadu

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: open-webui-xanadu-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Open WebUI to xanadu-host
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - xanadu-host
      - open-webui-deploy
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show deploy target
        run: |
          echo "branch=${GITHUB_REF_NAME}"
          git rev-parse HEAD

      - name: Deploy to xanadu-host
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/deploy-xanadu-openwebui.sh
          ./scripts/deploy-xanadu-openwebui.sh
